<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules Configuration - Deception Detection Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #fff;
        }

        header h1 span {
            color: #ef4444;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #666;
            font-size: 13px;
        }

        .logout-btn {
            color: #ef4444;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Rules Grid */
        .rules-grid {
            display: grid;
            gap: 15px;
        }

        .rule-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .rule-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .rule-card.disabled {
            opacity: 0.5;
        }

        .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .rule-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rule-toggle {
            width: 44px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rule-toggle.active {
            background: #22c55e;
        }

        .rule-toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.3s ease;
        }

        .rule-toggle.active::after {
            left: 23px;
        }

        .rule-name {
            font-weight: 600;
            color: #fff;
            font-size: 15px;
        }

        .rule-category {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .rule-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weight-badge {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            min-width: 50px;
            text-align: center;
        }

        .weight-low { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .weight-medium { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .weight-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .expand-icon {
            font-size: 18px;
            color: #666;
            transition: transform 0.3s ease;
        }

        .rule-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .rule-body {
            display: none;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .rule-card.expanded .rule-body {
            display: block;
        }

        .rule-description {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .rule-section {
            margin-bottom: 20px;
        }

        .rule-section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        /* Slider */
        .weight-slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weight-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }

        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s ease;
        }

        .weight-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .weight-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            min-width: 45px;
            text-align: right;
        }

        .weight-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        /* Patterns Editor */
        .patterns-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pattern-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pattern-input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .pattern-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .pattern-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .pattern-btn.delete {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .pattern-btn.add {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .pattern-btn:hover {
            filter: brightness(1.2);
        }

        /* Description Editor */
        .description-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }

        .description-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .rule-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 30px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal h2 {
            color: #fff;
            margin-bottom: 15px;
        }

        .modal p {
            color: #888;
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Deception <span>Detection</span> Lab</h1>
            <div style="display: flex; align-items: center; gap: 30px;">
                <nav class="nav-links">
                    <a href="/">Analyze Text</a>
                    <a href="/rules" class="active">Configure Rules</a>
                </nav>
                <div class="user-info">
                    <span class="user-email">{{ user }}</span>
                    <a href="/logout" class="logout-btn">Logout</a>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search rules..." oninput="filterRules()">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all" onclick="setFilter('all')">All</button>
                <button class="filter-btn" data-category="Pronouns" onclick="setFilter('Pronouns')">Pronouns</button>
                <button class="filter-btn" data-category="Temporal" onclick="setFilter('Temporal')">Temporal</button>
                <button class="filter-btn" data-category="Hedging" onclick="setFilter('Hedging')">Hedging</button>
                <button class="filter-btn" data-category="Denials" onclick="setFilter('Denials')">Denials</button>
                <button class="filter-btn" data-category="Emotional" onclick="setFilter('Emotional')">Emotional</button>
                <button class="filter-btn" data-category="Insurance" onclick="setFilter('Insurance')">Insurance</button>
                <button class="filter-btn" data-category="Corporate" onclick="setFilter('Corporate')">Corporate</button>
                <button class="filter-btn" data-category="Manipulation" onclick="setFilter('Manipulation')">Manipulation</button>
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="exportRules()">Export</button>
                <button class="btn btn-danger" onclick="confirmReset()">Reset All</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="totalRules">0</span>
                <span class="stat-label">Total Rules</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="enabledRules">0</span>
                <span class="stat-label">Enabled</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="modifiedRules">0</span>
                <span class="stat-label">Modified</span>
            </div>
        </div>

        <div class="rules-grid" id="rulesGrid">
            <!-- Rules will be loaded here -->
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal">
            <h2>Reset All Rules?</h2>
            <p>This will reset all weights and patterns back to their default values. This cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" onclick="resetAllRules()">Reset All</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script>
        let rules = [];
        let currentFilter = 'all';

        // Load rules on page load
        document.addEventListener('DOMContentLoaded', loadRules);

        async function loadRules() {
            try {
                const response = await fetch('/api/rules');
                rules = await response.json();
                renderRules();
                updateStats();
            } catch (error) {
                showToast('Failed to load rules', true);
            }
        }

        function renderRules() {
            const grid = document.getElementById('rulesGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            const filteredRules = rules.filter(rule => {
                const matchesFilter = currentFilter === 'all' || rule.category === currentFilter;
                const matchesSearch = rule.name.toLowerCase().includes(searchTerm) ||
                                     rule.description.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });

            grid.innerHTML = filteredRules.map(rule => createRuleCard(rule)).join('');
        }

        function createRuleCard(rule) {
            const weightClass = rule.weight >= 1.5 ? 'weight-high' :
                               rule.weight >= 1.3 ? 'weight-medium' : 'weight-low';
            const isModified = rule.weight !== rule.default_weight;
            const enabledClass = rule.enabled ? '' : 'disabled';
            const toggleClass = rule.enabled ? 'active' : '';

            return `
                <div class="rule-card ${enabledClass}" data-id="${rule.id}" data-category="${rule.category}">
                    <div class="rule-header" onclick="toggleExpand(${rule.id})">
                        <div class="rule-title">
                            <div class="rule-toggle ${toggleClass}" onclick="event.stopPropagation(); toggleRule(${rule.id})"></div>
                            <span class="rule-name">${rule.name}</span>
                            <span class="rule-category">${rule.category}</span>
                            ${isModified ? '<span style="color: #f97316; font-size: 12px;">Modified</span>' : ''}
                        </div>
                        <div class="rule-meta">
                            <span class="weight-badge ${weightClass}">${rule.weight.toFixed(1)}x</span>
                            <span class="expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="rule-body">
                        <div class="rule-section">
                            <div class="rule-section-title">Description</div>
                            <textarea class="description-input"
                                      id="desc-${rule.id}"
                                      onchange="updateDescription(${rule.id})">${rule.description}</textarea>
                        </div>

                        <div class="rule-section">
                            <div class="rule-section-title">Weight (Impact on Score)</div>
                            <div class="weight-slider-container">
                                <input type="range"
                                       class="weight-slider"
                                       id="weight-${rule.id}"
                                       min="0" max="3" step="0.1"
                                       value="${rule.weight}"
                                       oninput="updateWeightPreview(${rule.id}, this.value)"
                                       onchange="saveWeight(${rule.id}, this.value)">
                                <span class="weight-value" id="weight-val-${rule.id}">${rule.weight.toFixed(1)}</span>
                            </div>
                            <div class="weight-labels">
                                <span>Off (0)</span>
                                <span>Low (1.0)</span>
                                <span>Medium (1.5)</span>
                                <span>High (2.0)</span>
                                <span>Max (3.0)</span>
                            </div>
                        </div>

                        <div class="rule-section">
                            <div class="rule-section-title">Detection Patterns (Regex)</div>
                            <div class="patterns-list" id="patterns-${rule.id}">
                                ${rule.patterns.map((pattern, idx) => `
                                    <div class="pattern-item">
                                        <input type="text" class="pattern-input"
                                               value="${escapeHtml(pattern)}"
                                               data-rule="${rule.id}"
                                               data-index="${idx}"
                                               onchange="updatePattern(${rule.id}, ${idx}, this.value)">
                                        <button class="pattern-btn delete" onclick="deletePattern(${rule.id}, ${idx})">×</button>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="addPattern(${rule.id})">
                                + Add Pattern
                            </button>
                        </div>

                        <div class="rule-actions">
                            <button class="btn btn-secondary" onclick="resetRule(${rule.id})">Reset to Default</button>
                            <button class="btn btn-primary" onclick="testRule(${rule.id})">Test Pattern</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleExpand(id) {
            const card = document.querySelector(`.rule-card[data-id="${id}"]`);
            card.classList.toggle('expanded');
        }

        async function toggleRule(id) {
            const rule = rules.find(r => r.id === id);
            rule.enabled = !rule.enabled;

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: rule.enabled })
                });
                renderRules();
                updateStats();
                showToast(rule.enabled ? 'Rule enabled' : 'Rule disabled');
            } catch (error) {
                showToast('Failed to update rule', true);
            }
        }

        function updateWeightPreview(id, value) {
            document.getElementById(`weight-val-${id}`).textContent = parseFloat(value).toFixed(1);
        }

        async function saveWeight(id, value) {
            const rule = rules.find(r => r.id === id);
            rule.weight = parseFloat(value);

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ weight: rule.weight })
                });
                renderRules();
                updateStats();
                showToast('Weight updated');
            } catch (error) {
                showToast('Failed to save weight', true);
            }
        }

        async function updateDescription(id) {
            const desc = document.getElementById(`desc-${id}`).value;
            const rule = rules.find(r => r.id === id);
            rule.description = desc;

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc })
                });
                showToast('Description updated');
            } catch (error) {
                showToast('Failed to save description', true);
            }
        }

        async function updatePattern(id, index, value) {
            const rule = rules.find(r => r.id === id);
            rule.patterns[index] = value;

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patterns: rule.patterns })
                });
                showToast('Pattern updated');
            } catch (error) {
                showToast('Failed to save pattern', true);
            }
        }

        async function deletePattern(id, index) {
            const rule = rules.find(r => r.id === id);
            rule.patterns.splice(index, 1);

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patterns: rule.patterns })
                });
                renderRules();
                showToast('Pattern deleted');
            } catch (error) {
                showToast('Failed to delete pattern', true);
            }
        }

        async function addPattern(id) {
            const rule = rules.find(r => r.id === id);
            rule.patterns.push('\\bnew_pattern\\b');

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patterns: rule.patterns })
                });
                renderRules();
                // Re-expand the card
                setTimeout(() => toggleExpand(id), 50);
                showToast('Pattern added');
            } catch (error) {
                showToast('Failed to add pattern', true);
            }
        }

        async function resetRule(id) {
            const rule = rules.find(r => r.id === id);

            try {
                await fetch(`/api/rules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ weight: rule.default_weight })
                });
                await loadRules();
                showToast('Rule reset to default');
            } catch (error) {
                showToast('Failed to reset rule', true);
            }
        }

        function testRule(id) {
            const rule = rules.find(r => r.id === id);
            const testText = prompt('Enter text to test against this rule:');
            if (!testText) return;

            let matches = [];
            for (const pattern of rule.patterns) {
                try {
                    const regex = new RegExp(pattern, 'gi');
                    const found = testText.match(regex);
                    if (found) matches.push(...found);
                } catch (e) {
                    showToast(`Invalid pattern: ${pattern}`, true);
                }
            }

            if (matches.length > 0) {
                alert(`Found ${matches.length} match(es):\n\n${matches.join('\n')}`);
            } else {
                alert('No matches found');
            }
        }

        function setFilter(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            renderRules();
        }

        function filterRules() {
            renderRules();
        }

        function updateStats() {
            document.getElementById('totalRules').textContent = rules.length;
            document.getElementById('enabledRules').textContent = rules.filter(r => r.enabled).length;
            document.getElementById('modifiedRules').textContent = rules.filter(r => r.weight !== r.default_weight).length;
        }

        function confirmReset() {
            document.getElementById('resetModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('resetModal').classList.remove('show');
        }

        async function resetAllRules() {
            try {
                await fetch('/api/rules/reset', { method: 'POST' });
                await loadRules();
                closeModal();
                showToast('All rules reset to defaults');
            } catch (error) {
                showToast('Failed to reset rules', true);
            }
        }

        function exportRules() {
            const data = JSON.stringify(rules, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'deception-rules.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Rules exported');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
