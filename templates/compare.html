<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Statements - Deception Detection Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #fff;
        }

        header h1 span {
            color: #ef4444;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1000px) {
            .compare-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-label {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: auto;
        }

        .panel-a .panel-label {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .panel-b .panel-label {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .compare-actions {
            text-align: center;
            margin: 20px 0;
        }

        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 1000px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid;
        }

        .result-panel-a {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .result-panel-b {
            border-color: rgba(168, 85, 247, 0.5);
        }

        .score-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 4px solid;
        }

        .score-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .score-label {
            font-size: 0.7rem;
            color: #888;
        }

        .score-info h3 {
            color: #fff;
            margin-bottom: 5px;
        }

        .score-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .indicators-summary {
            margin-top: 15px;
        }

        .indicator-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .indicator-row:last-child {
            border-bottom: none;
        }

        .indicator-name {
            color: #e0e0e0;
        }

        .indicator-count {
            color: #888;
        }

        .only-in {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* Comparison Summary */
        .comparison-summary {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }

        .comparison-summary h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .summary-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-card-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }

        .summary-card-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .diff-positive {
            color: #ef4444;
        }

        .diff-negative {
            color: #22c55e;
        }

        .unique-indicators {
            margin-top: 20px;
        }

        .unique-indicators h3 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .unique-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .unique-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .unique-tag-a {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .unique-tag-b {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.85rem;
            margin-top: 40px;
        }

        footer a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Deception <span>Detection</span> Lab</h1>
            <nav class="nav-links">
                <a href="/">Analyze</a>
                <a href="/compare" class="active">Compare</a>
                <a href="/rules">Rules</a>
            </nav>
        </header>

        <div class="compare-grid">
            <div class="panel panel-a">
                <h2>
                    <span>📄 Statement A</span>
                    <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
                        <select id="sampleA" onchange="loadSampleA()" style="padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(59,130,246,0.5); background: rgba(59,130,246,0.1); color: #3b82f6; font-size: 12px; cursor: pointer;">
                            <option value="">Load Example...</option>
                            <optgroup label="Claims Verification">
                                <option value="insurance_initial">Property Claim - Initial</option>
                                <option value="motor_claimant">Motor Claim - Claimant</option>
                                <option value="injury_claimant">Injury Claim - Claimant</option>
                            </optgroup>
                            <optgroup label="Recruitment">
                                <option value="candidate_statement">Candidate Application</option>
                            </optgroup>
                            <optgroup label="Workplace">
                                <option value="complainant_statement">Harassment - Complainant</option>
                            </optgroup>
                            <optgroup label="Legal">
                                <option value="plaintiff_witness">Civil Case - Plaintiff Witness</option>
                                <option value="witness_a">Criminal - Witness A</option>
                                <option value="suspect_initial">Interview - Initial</option>
                            </optgroup>
                        </select>
                        <span class="panel-label">Original / First</span>
                    </div>
                </h2>
                <textarea id="textA" placeholder="Paste the first statement here...

Examples:
• Initial insurance claim
• First witness account
• Original statement"></textarea>
            </div>

            <div class="panel panel-b">
                <h2>
                    <span>📄 Statement B</span>
                    <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
                        <select id="sampleB" onchange="loadSampleB()" style="padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(168,85,247,0.5); background: rgba(168,85,247,0.1); color: #a855f7; font-size: 12px; cursor: pointer;">
                            <option value="">Load Example...</option>
                            <optgroup label="Claims Verification">
                                <option value="insurance_followup">Property Claim - Follow-up</option>
                                <option value="motor_witness">Motor Claim - Ind. Witness</option>
                                <option value="injury_cctv">Injury Claim - CCTV Review</option>
                            </optgroup>
                            <optgroup label="Recruitment">
                                <option value="reference_check">Reference Check Response</option>
                            </optgroup>
                            <optgroup label="Workplace">
                                <option value="accused_response">Harassment - Accused Response</option>
                            </optgroup>
                            <optgroup label="Legal">
                                <option value="defendant_witness">Civil Case - Defendant Witness</option>
                                <option value="witness_b">Criminal - Witness B</option>
                                <option value="suspect_followup">Interview - Follow-up</option>
                            </optgroup>
                        </select>
                        <span class="panel-label">Follow-up / Second</span>
                    </div>
                </h2>
                <textarea id="textB" placeholder="Paste the second statement here...

Examples:
• Follow-up claim
• Second witness account
• Revised statement"></textarea>
            </div>
        </div>

        <div class="compare-actions">
            <button class="btn btn-primary" id="compareBtn" onclick="compareTexts()">
                Compare Statements
            </button>
        </div>

        <div id="emptyState" class="empty-state">
            <div class="icon">⚖️</div>
            <p>Enter two statements and click "Compare" to see side-by-side analysis</p>
        </div>

        <div id="resultsSection" style="display: none;">
            <div class="results-grid">
                <div class="result-panel result-panel-a" id="resultA"></div>
                <div class="result-panel result-panel-b" id="resultB"></div>
            </div>

            <div class="comparison-summary" id="comparisonSummary"></div>
        </div>

        <footer>
            Based on Forensic Statement & Linguistic Analysis (FSLA) methodology<br>
            Powered by <a href="https://www.ddlltd.com" target="_blank">Deception Detection Lab</a>
        </footer>
    </div>

    <script>
        // Sample texts for comparison
        const samplesA = {
            // CLAIMS VERIFICATION
            insurance_initial: `INITIAL INSURANCE CLAIM
Claim Reference: INS-2026-8834
Date: 10 May 2026
Claimant: Robert Jenkins

Statement of Loss:

On the evening of May 8th, I returned home from work at approximately 6:30pm to find that my house had been broken into. The back door had been forced open.

- MacBook Pro laptop - £2,400

- My wife's gold necklace - £800

Total estimated value: £4,900

I called the police immediately and they attended within an hour. Crime reference number: 4521-2026-MAY.

Robert Jenkins`,

            motor_claimant: `MOTOR ACCIDENT - CLAIMANT STATEMENT
Claim Reference: AUTO-2026-44521
Date: 15 May 2026

On 12th May at approximately 3pm, I was driving along the B4562 towards Abergavenny. I was travelling at about 30mph in the 40 zone, being cautious due to the weather conditions.

Steven Price`,

            injury_claimant: `PERSONAL INJURY CLAIM
Claim Reference: PI-2026-7821

Angela Morrison`,

            // RECRUITMENT SCREENING
            candidate_statement: `JOB APPLICATION - PERSONAL STATEMENT
Position: Head of Digital Marketing
Candidate: Jennifer Walsh
Date: 20 May 2026

            // WORKPLACE INVESTIGATIONS
            complainant_statement: `HARASSMENT COMPLAINT
HR Case: WI-2026-0892
Complainant: Emma Clarke
Date: 19 May 2026

I am writing to formally report harassment by my colleague, Tom Bradley.

To be completely honest, I'm not the type of person to make complaints. Everyone will tell you I'm very easy-going. But this situation has become unbearable.

The incidents have been happening for several months. I believe it started around February. Tom has been making comments that make me uncomfortable. I can't remember the exact words, but they were inappropriate.

This is affecting my mental health significantly. I've had sleepless nights and my family is very worried. My performance has suffered, which isn't fair.

I would like this investigated urgently.

Emma Clarke`,

            // LEGAL EVIDENCE
            plaintiff_witness: `WITNESS STATEMENT - FOR CLAIMANT
Case: Morrison v Riverside Shopping Centre
Witness: David Chen
Date: 22 May 2026

I was at Riverside Shopping Centre on 14th May at approximately 2pm when I witnessed an accident.

I saw the claimant, a middle-aged woman, slip and fall near the main entrance. The floor appeared to be wet. I did not see any warning signs in the area.

The woman fell heavily and was clearly in pain. She was unable to get up without assistance. Staff took several minutes to respond.

I noticed that the floor was slippery because I nearly slipped myself when I went to help. It seemed dangerous.

In my opinion, the shopping centre should have taken better precautions. The conditions were clearly hazardous.

I have no connection to the claimant and am simply reporting what I observed.

Statement of Truth: I believe the facts in this statement are true.

David Chen`,

            witness_a: `WITNESS STATEMENT - Person A
Case: Street Altercation
Date: 14 May 2026
Witness: Sarah Thompson

I was walking home from the shops at about 3pm when I saw two men arguing outside the pub on High Street. One man was wearing a red jacket, the other had a blue hoodie.

The man in the red jacket pushed the other one first. I clearly saw this. Then the man in the blue hoodie punched him back. It was definitely self-defense.

The man in red fell down and hit his head on the pavement. The other man ran off towards the park.

I stayed and called for help. The ambulance came about 10 minutes later.

I am certain about what I saw because I was only about 20 feet away and had a clear view.

Sarah Thompson`,

            suspect_initial: `INTERVIEW TRANSCRIPT - Initial
Case: Missing Inventory
Date: 15 May 2026
Interviewee: David Wilson

Q: Can you tell us about your whereabouts on the night of May 12th?

A: I was at work until about 6pm, then I went straight home. I had dinner with my wife around 7, watched some TV, and went to bed around 11.

Q: Did you notice anything unusual in the warehouse that day?

A: No, everything was normal. We processed the usual shipments. Nothing out of the ordinary.

Q: Do you have access to the secure storage area?

A: Yes, I have a key card. All supervisors do. But I only go in there when I need to for legitimate work purposes.

Q: When did you last access that area?

A: I think it was a few days before. Maybe the 9th or 10th? I'm not exactly sure.

David Wilson`
        };

        const samplesB = {
            // CLAIMS VERIFICATION
            insurance_followup: `FOLLOW-UP INSURANCE STATEMENT
Claim Reference: INS-2026-8834
Date: 18 May 2026
Claimant: Robert Jenkins

Following your request for additional information:

I need to clarify some details from my original claim. Upon further reflection, I believe I may have underestimated some values.

Revised items list:
- Sony 75" OLED television (not 65") - £2,800
- MacBook Pro laptop (latest model) - £3,200
- Cash from bedroom drawer - approximately £800
- Wife's gold necklace with diamond pendant - £2,500
- Rolex watch (forgot to mention initially) - £8,500
- Designer handbag collection - £4,000

Revised total: £21,800

I apologize for the initial confusion. The stress of the situation affected my memory. I have photographs of most items on my phone.

I would like this matter resolved as quickly as possible as we are experiencing financial difficulties.

Robert Jenkins`,

            motor_witness: `MOTOR ACCIDENT - INDEPENDENT WITNESS
Claim Reference: AUTO-2026-44521
Date: 16 May 2026
Witness: Carol Hughes (following vehicle)

I was driving behind a BMW on the B4562 on 12th May at around 3pm.

I observed the BMW travelling at what appeared to be well above the speed limit, approximately 50-55mph. The driver seemed to be in a hurry and had been tailgating the car in front.

I am happy to provide further information if required.

Carol Hughes`,

            injury_cctv: `CCTV REVIEW SUMMARY
Claim Reference: PI-2026-7821
Prepared by: Security Manager, Riverside Shopping Centre
Date: 20 May 2026

Following review of CCTV footage from 14th May:

13:47 - Claimant enters through main entrance, appears to be looking at mobile phone
13:48 - Claimant walks directly through area where wet floor sign is clearly visible
13:48 - Claimant slips and falls (wet floor sign visible in frame, approximately 2 metres from incident location)
13:49 - Two staff members approach within 45 seconds
13:50 - First aider arrives with wheelchair

Additional observations:
- Yellow wet floor sign clearly deployed and visible in footage
- Sign positioned at standard location per protocol
- Three other customers observed navigating around sign successfully in preceding 5 minutes
- Claimant appeared distracted by phone at time of incident

Footage preserved and available for legal review.`,

            // RECRUITMENT SCREENING
            reference_check: `REFERENCE CHECK - CONFIDENTIAL
Candidate: Jennifer Walsh
Referee: Mark Stevens, Former Line Manager, Apex Media Group
Date: 22 May 2026

            // WORKPLACE INVESTIGATIONS
            accused_response: `RESPONSE TO HARASSMENT ALLEGATION
HR Case: WI-2026-0892
Employee: Tom Bradley
Date: 21 May 2026

I am writing to respond to the allegations made by Emma Clarke.

            // LEGAL EVIDENCE
            defendant_witness: `WITNESS STATEMENT - FOR DEFENDANT
Case: Morrison v Riverside Shopping Centre
Witness: Shop Assistant, Ground Floor

            witness_b: `WITNESS STATEMENT - Person B
Case: Street Altercation
Date: 14 May 2026
Witness: Mark Phillips

Mark Phillips`,

            suspect_followup: `INTERVIEW TRANSCRIPT - Follow-up
Case: Missing Inventory
Date: 18 May 2026

        };

        function loadSampleA() {
            const select = document.getElementById('sampleA');
            const key = select.value;
            if (key && samplesA[key]) {
                document.getElementById('textA').value = samplesA[key];
            }
            select.value = '';
        }

        function loadSampleB() {
            const select = document.getElementById('sampleB');
            const key = select.value;
            if (key && samplesB[key]) {
                document.getElementById('textB').value = samplesB[key];
            }
            select.value = '';
        }

        async function compareTexts() {
            const textA = document.getElementById('textA').value.trim();
            const textB = document.getElementById('textB').value.trim();
            const btn = document.getElementById('compareBtn');

            if (!textA || !textB) {
                alert('Please enter both statements to compare');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Analyzing...';

            try {
                // Analyze both texts
                const [responseA, responseB] = await Promise.all([
                    fetch('/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textA })
                    }),
                    fetch('/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textB })
                    })
                ]);

                const dataA = await responseA.json();
                const dataB = await responseB.json();

                if (dataA.error || dataB.error) {
                    alert(dataA.error || dataB.error);
                    return;
                }

                displayComparison(dataA, dataB);

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during comparison');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Compare Statements';
            }
        }

        function displayComparison(dataA, dataB) {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            // Get indicator names
            const indicatorsA = new Set(dataA.indicators.map(i => i.name));
            const indicatorsB = new Set(dataB.indicators.map(i => i.name));
            const onlyInA = [...indicatorsA].filter(i => !indicatorsB.has(i));
            const onlyInB = [...indicatorsB].filter(i => !indicatorsA.has(i));
            const inBoth = [...indicatorsA].filter(i => indicatorsB.has(i));

            // Render result panels
            document.getElementById('resultA').innerHTML = renderResultPanel(dataA, 'A', onlyInA);
            document.getElementById('resultB').innerHTML = renderResultPanel(dataB, 'B', onlyInB);

            // Render comparison summary
            const scoreDiff = (dataB.score - dataA.score).toFixed(2);
            const diffClass = parseFloat(scoreDiff) > 0 ? 'diff-positive' : parseFloat(scoreDiff) < 0 ? 'diff-negative' : '';
            const diffText = parseFloat(scoreDiff) > 0 ? `+${scoreDiff}` : scoreDiff;

            // Generate comparison interpretation
            let comparisonInterpretation = '';
            const scoreDiffNum = parseFloat(scoreDiff);

            if (Math.abs(scoreDiffNum) < 5) {
                comparisonInterpretation = 'Both statements show similar risk levels. Look for qualitative differences in the specific indicators detected rather than overall scores.';
            } else if (scoreDiffNum > 20) {
                comparisonInterpretation = 'Statement B shows significantly higher deception indicators than Statement A. This substantial increase may indicate the subject became less careful, introduced fabricated details, or was caught in inconsistencies requiring explanation.';
            } else if (scoreDiffNum > 10) {
                comparisonInterpretation = 'Statement B shows notably more deception indicators. The increase warrants examination of what changed between statements and why new concerning patterns emerged.';
            } else if (scoreDiffNum > 0) {
                comparisonInterpretation = 'Statement B shows somewhat higher risk indicators. Review the unique indicators in each statement to understand what drove the increase.';
            } else if (scoreDiffNum < -20) {
                comparisonInterpretation = 'Statement A shows significantly higher deception indicators than Statement B. The second statement may reflect more careful language or genuine clarification of earlier concerns.';
            } else if (scoreDiffNum < -10) {
                comparisonInterpretation = 'Statement A shows notably more deception indicators. Consider whether Statement B represents a more truthful account or simply more guarded language.';
            } else {
                comparisonInterpretation = 'Statement A shows somewhat higher risk indicators. Review what indicators dropped off in Statement B.';
            }

            if (onlyInB.length > onlyInA.length + 3) {
                comparisonInterpretation += ' Notably, Statement B introduces several new concerning patterns not present in the original statement.';
            }

            document.getElementById('comparisonSummary').innerHTML = `
                <h2>📊 Comparison Summary</h2>

                <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.7;">
                    <strong style="color: #3b82f6;">Interpretation:</strong> ${comparisonInterpretation}
                </div>

                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-card-value" style="color: ${dataA.risk_color};">${dataA.score.toFixed(2)}</div>
                        <div class="summary-card-label">Statement A Score</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-value" style="color: ${dataB.risk_color};">${dataB.score.toFixed(2)}</div>
                        <div class="summary-card-label">Statement B Score</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-value ${diffClass}">${diffText}</div>
                        <div class="summary-card-label">Score Difference</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-value">${inBoth.length}</div>
                        <div class="summary-card-label">Common Indicators</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div style="background: rgba(59, 130, 246, 0.05); border-radius: 12px; padding: 15px; border-left: 4px solid #3b82f6;">
                        <strong style="color: #3b82f6;">Statement A Summary:</strong><br>
                        <span style="color: #ccc; font-size: 0.9rem; line-height: 1.6;">${dataA.plain_summary || 'No significant patterns detected.'}</span>
                    </div>
                    <div style="background: rgba(168, 85, 247, 0.05); border-radius: 12px; padding: 15px; border-left: 4px solid #a855f7;">
                        <strong style="color: #a855f7;">Statement B Summary:</strong><br>
                        <span style="color: #ccc; font-size: 0.9rem; line-height: 1.6;">${dataB.plain_summary || 'No significant patterns detected.'}</span>
                    </div>
                </div>

                ${onlyInA.length > 0 ? `
                <div class="unique-indicators">
                    <h3>🔵 Only in Statement A (${onlyInA.length})</h3>
                    <div class="unique-list">
                        ${onlyInA.map(i => `<span class="unique-tag unique-tag-a">${i}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                ${onlyInB.length > 0 ? `
                <div class="unique-indicators">
                    <h3>🟣 Only in Statement B (${onlyInB.length})</h3>
                    <div class="unique-list">
                        ${onlyInB.map(i => `<span class="unique-tag unique-tag-b">${i}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                ${inBoth.length > 0 ? `
                <div class="unique-indicators">
                    <h3>⚪ Present in Both (${inBoth.length})</h3>
                    <div class="unique-list">
                        ${inBoth.map(i => `<span class="unique-tag" style="background: rgba(255,255,255,0.1); color: #888;">${i}</span>`).join('')}
                    </div>
                </div>
                ` : ''}
            `;
        }

        function renderResultPanel(data, label, uniqueIndicators) {
            const uniqueSet = new Set(uniqueIndicators);

            return `
                <div class="score-header">
                    <div class="score-circle" style="border-color: ${data.risk_color};">
                        <span class="score-number">${data.score.toFixed(2)}</span>
                        <span class="score-label">/ 100</span>
                    </div>
                    <div class="score-info">
                        <h3>Statement ${label}</h3>
                        <div class="score-meta" style="color: ${data.risk_color};">${data.risk_level}</div>
                        <div class="score-meta">${data.word_count} words • ${data.indicators_count} indicators</div>
                    </div>
                </div>

                <div class="indicators-summary">
                    <h4 style="color: #fff; margin-bottom: 10px; font-size: 0.9rem;">Top Indicators</h4>
                    ${data.indicators.slice(0, 8).map(ind => `
                        <div class="indicator-row">
                            <span class="indicator-name">
                                ${ind.name}
                                ${uniqueSet.has(ind.name) ? '<span class="only-in">UNIQUE</span>' : ''}
                            </span>
                            <span class="indicator-count">${ind.count} matches</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
